name: yapp
description: Voice-first social media for culture, news & memes.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Backend
  supabase_flutter: ^2.3.0

  # State Management
  flutter_riverpod: ^2.4.9

  # Navigation
  go_router: ^13.2.0

  # UI
  google_fonts: ^6.1.0
  flutter_animate: ^4.5.0
  gap: ^3.0.1

  # Audio
  record: ^5.0.4
  just_audio: ^0.9.36
  path_provider: ^2.1.1
  http: ^1.1.0
  permission_handler: ^11.1.0

  # Image
  image_picker: ^1.0.7
  flutter_image_compress: ^2.1.0

dependency_overrides:
  record_linux: ^1.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
    - assets/audio/
